<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Administracao do estoque de veiculos">
  <title>Garage B2B | Administração</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/app.js" defer></script>
</head>
<body data-page="admin">
  <header class="topbar">
    <a class="brand" href="/">Garage<span>B2B</span></a>
    <a class="nav-link" href="/">Ver catálogo</a>
  </header>

  <main class="container">
    <section class="hero compact">
      <p class="eyebrow">Área administrativa</p>
      <h1>Controle de estoque</h1>
      <p>Cadastre veículos, altere a situação e registre avarias.</p>
    </section>

    <div id="feedback" class="feedback" role="status" aria-live="polite"></div>

    <section class="panel">
      <div class="section-heading">
        <h2>Novo veículo</h2>
        <button id="toggle-form" class="button secondary" type="button" aria-expanded="true">Ocultar formulário</button>
      </div>
      <form id="vehicle-form" class="vehicle-form">
        <label>Marca<input name="marca" required maxlength="50" placeholder="Ex.: Honda"></label>
        <label>Modelo<input name="modelo" required maxlength="80" placeholder="Ex.: Civic Touring"></label>
        <label>Ano<input name="ano" type="number" required min="1900" max="2100" placeholder="2024"></label>
        <label>Quilometragem<input name="km" type="number" required min="0" step="1" placeholder="15000"></label>
        <label>Status
          <select name="status">
            <option value="disponivel">Disponível</option>
            <option value="reservado">Reservado</option>
            <option value="vendido">Vendido</option>
          </select>
        </label>
        <label class="wide">URLs das fotos <span>(uma por linha)</span><textarea name="fotos" rows="3" placeholder="https://..."></textarea></label>
        <label class="wide">Avarias <span>(uma por linha)</span><textarea name="avarias" rows="3" placeholder="Descreva avarias conhecidas"></textarea></label>
        <label class="wide">Observações<textarea name="observacoes" rows="3" maxlength="500" placeholder="Histórico, documentos, acessórios..."></textarea></label>
        <button class="button primary wide" type="submit">Cadastrar veículo</button>
      </form>
    </section>

    <section class="admin-stock">
      <div class="section-heading"><h2>Estoque completo</h2><span id="total" class="count"></span></div>
      <div id="admin-list" class="admin-list"></div>
    </section>
  </main>
</body>
</html>
